<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSP – Product</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['IBM Plex Sans', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="font-sans bg-gray-50 h-screen overflow-hidden">
<div class="flex h-screen">
  <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 lg:hidden hidden" onclick="toggleSidebar()"></div>

  <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-slate-800 z-50 transform -translate-x-full lg:translate-x-0 lg:static lg:z-auto transition-transform duration-300 ease-in-out flex flex-col flex-shrink-0">
    <div class="h-16 flex items-center gap-3 px-5 border-b border-slate-700 flex-shrink-0">
      <img src="assets/logo osp.png" alt="Logo OSP" class="h-8 w-auto">
      <span class="text-white font-bold text-lg tracking-tight">OSP</span>
    </div>
    <div class="mx-3 mt-4 mb-2 p-3 bg-slate-700/50 rounded-xl flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-orange-400 rounded-full flex items-center justify-center flex-shrink-0">
        <i data-lucide="user" class="w-5 h-5 text-white"></i>
      </div>
      <div class="min-w-0">
        <div class="text-white text-sm font-semibold truncate">osp_kemang</div>
        <div class="text-slate-400 text-xs uppercase tracking-wider">MERCHANT</div>
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto px-3 py-3 space-y-1 sidebar-scrollbar">
      <a href="home.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
        <i data-lucide="home" class="w-[18px] h-[18px] flex-shrink-0"></i>Home
      </a>
      <div>
        <button data-menu-toggle="sub-merchant" class="flex items-center justify-between w-full px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
          <span class="flex items-center gap-3"><i data-lucide="store" class="w-[18px] h-[18px] flex-shrink-0"></i>Manage Merchant</span>
          <i data-lucide="chevron-down" class="w-4 h-4 arrow-icon"></i>
        </button>
        <div class="menu-sub" id="sub-merchant">
          <div class="ml-[30px] pl-3 border-l border-slate-600 mt-1 space-y-0.5">
            <a href="cardverify.html" class="menu-sub-link block px-3 py-2 rounded-md text-sm text-slate-400 hover:text-white hover:bg-white/5 transition-colors">Card Verify Submission</a>
            <a href="members.html" class="menu-sub-link block px-3 py-2 rounded-md text-sm text-slate-400 hover:text-white hover:bg-white/5 transition-colors">Members</a>
            <a href="monthlypayment.html" class="menu-sub-link block px-3 py-2 rounded-md text-sm text-slate-400 hover:text-white hover:bg-white/5 transition-colors">Monthly Payment</a>
          </div>
        </div>
      </div>
      <div>
        <button data-menu-toggle="sub-package" class="flex items-center justify-between w-full px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
          <span class="flex items-center gap-3"><i data-lucide="package" class="w-[18px] h-[18px] flex-shrink-0"></i>Package & Product</span>
          <i data-lucide="chevron-down" class="w-4 h-4 arrow-icon"></i>
        </button>
        <div class="menu-sub" id="sub-package">
          <div class="ml-[30px] pl-3 border-l border-slate-600 mt-1 space-y-0.5">
            <a href="product.html" class="menu-sub-link active block px-3 py-2 rounded-md text-sm text-white bg-white/5 font-medium">Product</a>
          </div>
        </div>
      </div>
      <div>
        <button data-menu-toggle="sub-report" class="flex items-center justify-between w-full px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
          <span class="flex items-center gap-3"><i data-lucide="bar-chart-3" class="w-[18px] h-[18px] flex-shrink-0"></i>Report</span>
          <i data-lucide="chevron-down" class="w-4 h-4 arrow-icon"></i>
        </button>
        <div class="menu-sub" id="sub-report">
          <div class="ml-[30px] pl-3 border-l border-slate-600 mt-1 space-y-0.5">
            <a href="dailytransaction.html" class="menu-sub-link block px-3 py-2 rounded-md text-sm text-slate-400 hover:text-white hover:bg-white/5 transition-colors">Daily Transaction</a>
          </div>
        </div>
      </div>
    </nav>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-6 flex-shrink-0 shadow-sm">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="lg:hidden p-2 -ml-2 rounded-lg hover:bg-gray-100 transition-colors">
          <i data-lucide="menu" class="w-5 h-5 text-gray-600"></i>
        </button>
        <div class="flex items-center text-sm gap-1.5">
          <a href="home.html" class="text-gray-400 hover:text-gray-600 transition-colors">Home</a>
          <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-gray-300"></i>
          <span class="text-gray-400">Package & Product</span>
          <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-gray-300"></i>
          <span class="text-gray-900 font-semibold">Product</span>
        </div>
      </div>
      <div class="flex items-center gap-1">
        <button class="p-2 rounded-lg hover:bg-gray-100 transition-colors group" title="Power"><i data-lucide="power" class="w-5 h-5 text-gray-400 group-hover:text-gray-600"></i></button>
        <button class="p-2 rounded-lg hover:bg-gray-100 transition-colors group" title="Fullscreen"><i data-lucide="maximize" class="w-5 h-5 text-gray-400 group-hover:text-gray-600"></i></button>
        <button class="p-2 rounded-lg hover:bg-gray-100 transition-colors group" title="Profile"><i data-lucide="user-circle" class="w-5 h-5 text-gray-400 group-hover:text-gray-600"></i></button>
        <button class="p-2 rounded-lg hover:bg-red-50 transition-colors group" title="Auth"><i data-lucide="key-round" class="w-5 h-5 text-red-400 group-hover:text-red-600"></i></button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-gray-50 p-4 lg:p-6">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
          <button onclick="prepareAdd()" class="inline-flex items-center gap-2 px-5 py-2.5 text-sm font-semibold text-white bg-violet-600 rounded-lg hover:bg-violet-700 transition-all shadow-sm active:scale-95">
            <i data-lucide="plus" class="w-4 h-4"></i>
            Add New Product
          </button>
          <div class="relative w-full sm:w-72">
            <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
            <input type="text" id="productSearch" oninput="filterProducts()" placeholder="Search product..." 
                   class="w-full pl-10 pr-4 py-2.5 text-sm border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:border-violet-400 focus:ring-4 focus:ring-violet-100 outline-none transition-all">
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="productGrid"></div>
    </main>
  </div>
</div>

<div class="modal-overlay hidden fixed inset-0 bg-black/40 z-[999] flex items-center justify-center p-4 backdrop-blur-sm" id="addProductModal">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-lg font-bold text-gray-900" id="modalTitle">Add New Product</h3>
      <button onclick="closeModal('addProductModal')" class="p-2 hover:bg-gray-100 rounded-lg transition-colors"><i data-lucide="x" class="w-5 h-5 text-gray-400"></i></button>
    </div>
    <div class="space-y-4">
      <input type="hidden" id="editId">
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Product Name</label>
        <input type="text" id="inName" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-violet-400 focus:ring-4 focus:ring-violet-100 outline-none transition-all" placeholder="Enter product name">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Category</label>
        <select id="inCat" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-violet-400 outline-none transition-all">
          <option>Subscription</option><option>PT Package</option><option>Merchandise</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Price (IDR)</label>
        <input type="number" id="inPrice" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:border-violet-400 outline-none font-mono" placeholder="0">
      </div>
    </div>
    <div class="flex gap-3 mt-8">
      <button class="flex-1 px-4 py-2.5 text-sm font-semibold text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200 transition-colors" onclick="closeModal('addProductModal')">Cancel</button>
      <button class="flex-1 px-4 py-2.5 text-sm font-semibold text-white bg-violet-600 rounded-xl hover:bg-violet-700 transition-colors" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
let PRODUCTS = [
  {id:'P1', name:'Monthly Subscription', cat:'Subscription', price:350000, icon:'🗓️'},
  {id:'P2', name:'Yearly Subscription', cat:'Subscription', price:3500000, icon:'📅'},
  {id:'P3', name:'Personal Training 10x', cat:'PT Package', price:2500000, icon:'💪'},
  {id:'P4', name:'Whey Protein Isolate', cat:'Merchandise', price:850000, icon:'🥤'},
  {id:'P5', name:'Gym Towel S', cat:'Merchandise', price:45000, icon:'🧣'},
  {id:'P6', name:'Shaker Bottle', cat:'Merchandise', price:75000, icon:'🍼'},
];

function renderProducts(data) {
  const container = document.getElementById('productGrid');
  container.innerHTML = data.map(p => `
    <div class="group bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
      <div class="aspect-video bg-slate-50 flex items-center justify-center text-5xl group-hover:scale-110 transition-transform duration-500">${p.icon}</div>
      <div class="p-5">
        <div class="flex justify-between items-center mb-2">
          <span class="px-2.5 py-1 text-[10px] font-bold text-violet-600 bg-violet-50 rounded-lg uppercase tracking-widest">${p.cat}</span>
          <span class="text-[10px] font-mono text-gray-400">${p.id}</span>
        </div>
        <h3 class="text-sm font-bold text-gray-900 mb-1 group-hover:text-violet-600 transition-colors">${p.name}</h3>
        <p class="text-lg font-bold text-slate-800 font-mono mt-3">IDR ${p.price.toLocaleString()}</p>
      </div>
      <div class="px-5 py-4 bg-gray-50/50 border-t border-gray-100 flex gap-2">
        <button onclick="editProduct('${p.id}')" class="flex-1 py-2 text-xs font-semibold text-gray-600 bg-white border border-gray-200 rounded-xl hover:bg-gray-100 transition-all active:scale-95">Edit</button>
        <button onclick="deleteProduct('${p.id}')" class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all"><i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i></button>
      </div>
    </div>`).join('');
  if (typeof lucide !== 'undefined') lucide.createIcons(); //
}

function prepareAdd() {
  document.getElementById('modalTitle').textContent = 'Add New Product';
  document.getElementById('editId').value = '';
  document.getElementById('inName').value = '';
  document.getElementById('inPrice').value = '';
  openModal('addProductModal'); //
}

function editProduct(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = 'Edit Product';
  document.getElementById('editId').value = p.id;
  document.getElementById('inName').value = p.name;
  document.getElementById('inCat').value = p.cat;
  document.getElementById('inPrice').value = p.price;
  openModal('addProductModal'); //
}

function saveProduct() {
  const id = document.getElementById('editId').value;
  const name = document.getElementById('inName').value;
  const cat = document.getElementById('inCat').value;
  const price = parseInt(document.getElementById('inPrice').value);

  if (!name || isNaN(price)) {
    showToast('Please fill all fields correctly!', 'error'); //
    return;
  }

  if (id) {
    const index = PRODUCTS.findIndex(p => p.id === id);
    PRODUCTS[index] = { ...PRODUCTS[index], name, cat, price };
    showToast('Product updated!', 'success'); //
  } else {
    const newId = 'P' + (PRODUCTS.length + 1);
    const icons = { 'Subscription': '🗓️', 'PT Package': '💪', 'Merchandise': '📦' };
    PRODUCTS.push({ id: newId, name, cat, price, icon: icons[cat] || '✨' });
    showToast('Product added successfully!', 'success'); //
  }

  renderProducts(PRODUCTS); // Render ulang grid agar data baru muncul
  closeModal('addProductModal'); //
}

function deleteProduct(id) {
  if(confirm('Are you sure you want to delete this product?')) {
    PRODUCTS = PRODUCTS.filter(p => p.id !== id);
    renderProducts(PRODUCTS);
    showToast('Product deleted.', 'success'); //
  }
}

function filterProducts() {
  const q = document.getElementById('productSearch').value.toLowerCase();
  renderProducts(PRODUCTS.filter(p => p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q)));
}

document.addEventListener('DOMContentLoaded', () => renderProducts(PRODUCTS));
</script>
</body>
</html>
