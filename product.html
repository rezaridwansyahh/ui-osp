<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSP – Product</title>
<link rel="stylesheet" href="styles.css">
<style>
.product-action-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--gray-100);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
  padding: 20px;
}
.product-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.15s, box-shadow 0.15s;
}
.product-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.1);
}
.product-img {
  width: 100%;
  height: 160px;
  background: var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  color: var(--gray-500);
}
.product-info {
  padding: 16px;
  flex: 1;
}
.product-cat {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--purple);
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.product-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 8px;
}
.product-price {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 700;
  color: var(--red);
}
.product-card-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--gray-200);
  display: flex;
  justify-content: flex-end;
  background: var(--gray-100);
}
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-left">
      <div class="logo-block">
  <img src="assets/logo osp.png" alt="Logo OSP">
</div>
      <span class="breadcrumb">Home &gt; Package &amp; Product &gt; Product</span>
    </div>
    <div class="header-icons">
      <button class="header-icon-btn">⏻</button>
      <button class="header-icon-btn">⛶</button>
      <button class="header-icon-btn">👤</button>
      <button class="header-icon-btn active">🔑</button>
    </div>
  </header>

  <div class="body">
    <nav class="sidebar">
  <div class="profile-card">
    <div class="profile-avatar">👤</div>
    <div class="profile-info">
      <span class="profile-name">osp_kemang</span>
      <span class="profile-role">MERCHANT + null</span>
    </div>
  </div>
      <a class="nav-item" href="home.html">Home</a>
      <a class="nav-item" href="#">Auth</a>
      <div class="nav-item" data-toggle="sub-merchant">Manage Merchant <span class="arrow">▾</span></div>
      <div class="nav-sub" id="sub-merchant">
        <a class="nav-sub-item" href="cardverify.html">Card Verify Submission</a>
        <a class="nav-sub-item" href="members.html">Members</a>
        <a class="nav-sub-item" href="monthlypayment.html">Monthly Payment</a>
      </div>
      <div class="nav-item open" data-toggle="sub-package">Package &amp; Product <span class="arrow">▾</span></div>
      <div class="nav-sub open" id="sub-package">
        <a class="nav-sub-item active" href="product.html">Product</a>
      </div>
      <div class="nav-item" data-toggle="sub-report">Report <span class="arrow">▾</span></div>
      <div class="nav-sub" id="sub-report">
        <a class="nav-sub-item" href="dailytransaction.html">Daily Transaction</a>
      </div>
    </nav>

    <main class="main">
      <div class="product-action-bar">
        <button class="btn btn-purple" onclick="openModal('addProductModal')">＋ Add New Product</button>
        <div style="margin-left:auto;">
          <div class="search-wrap">
            <input type="text" id="productSearch" placeholder="Search product…" oninput="filterProducts()">
            <button>🔍</button>
          </div>
        </div>
      </div>

      <div class="product-grid" id="productGrid">
        </div>
    </main>
  </div>
</div>

<div class="modal-overlay hidden" id="addProductModal">
  <div class="modal-box">
    <div class="modal-title">Add New Product</div>
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" class="form-control" placeholder="Enter product name">
    </div>
    <div class="form-group">
      <label>Category</label>
      <select class="form-control">
        <option>Subscription</option>
        <option>PT Package</option>
        <option>Merchandise</option>
      </select>
    </div>
    <div class="form-group">
      <label>Price (IDR)</label>
      <input type="number" class="form-control" placeholder="0">
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('addProductModal')">Cancel</button>
      <button class="btn btn-purple" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
const PRODUCTS = [
  {id:'P1', name:'Monthly Subscription', cat:'Subscription', price:350000, icon:'🗓'},
  {id:'P2', name:'Yearly Subscription', cat:'Subscription', price:3500000, icon:'📅'},
  {id:'P3', name:'Personal Training 10x', cat:'PT Package', price:2500000, icon:'💪'},
  {id:'P4', name:'Whey Protein Isolate', cat:'Merchandise', price:850000, icon:'🥤'},
  {id:'P5', name:'Gym Towel S', cat:'Merchandise', price:45000, icon:'🧣'},
  {id:'P6', name:'Shaker Bottle', cat:'Merchandise', price:75000, icon:'🍼'},
];

function renderProducts(data) {
  document.getElementById('productGrid').innerHTML = data.map(p => `
    <div class="product-card">
      <div class="product-img">${p.icon}</div>
      <div class="product-info">
        <div class="product-cat">${p.cat}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">IDR ${p.price.toLocaleString()}</div>
      </div>
      <div class="product-card-footer">
        <button class="btn btn-gray btn-sm">Edit</button>
      </div>
    </div>`).join('');
}

function filterProducts() {
  const q = document.getElementById('productSearch').value.toLowerCase();
  renderProducts(PRODUCTS.filter(p => p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q)));
}

function saveProduct() {
  closeModal('addProductModal');
  showToast('Product saved successfully!', 'success');
}

// Initial render
renderProducts(PRODUCTS);
</script>
</body>
</html>
