<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSP – Members</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['IBM Plex Sans', 'sans-serif'],
        mono: ['IBM Plex Mono', 'monospace'],
      }
    }
  }
}
</script>
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
.top-action-bar { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-bottom: 1px solid var(--border); background: var(--gray-100); flex-wrap: wrap; }
.search-right { margin-left: auto; }
.member-detail-row { font-size: 12px; color: var(--gray-500); }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(max-width:600px){ .modal-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body class="font-sans bg-gray-50 h-screen overflow-hidden">
<div class="flex h-screen">
  <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 lg:hidden hidden" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-slate-800 z-50 transform -translate-x-full lg:translate-x-0 lg:static lg:z-auto transition-transform duration-300 ease-in-out flex flex-col flex-shrink-0">
    <div class="h-16 flex items-center gap-3 px-5 border-b border-slate-700 flex-shrink-0">
      <img src="assets/logo osp.png" alt="Logo OSP" class="h-8 w-auto">
      <span class="text-white font-bold text-lg tracking-tight">OSP</span>
    </div>
    <div class="mx-3 mt-4 mb-2 p-3 bg-slate-700/50 rounded-xl flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-orange-400 rounded-full flex items-center justify-center flex-shrink-0">
        <i data-lucide="user" class="w-5 h-5 text-white"></i>
      </div>
      <div class="min-w-0">
        <div class="text-white text-sm font-semibold truncate">osp_kemang</div>
        <div class="text-slate-400 text-xs uppercase tracking-wider">MERCHANT</div>
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto px-3 py-3 space-y-1 sidebar-scrollbar">
      <a href="home.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
        <i data-lucide="home" class="w-[18px] h-[18px] flex-shrink-0"></i>
        Home
      </a>
      <div>
        <button data-menu-toggle="sub-merchant" class="flex items-center justify-between w-full px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
          <span class="flex items-center gap-3">
            <i data-lucide="store" class="w-[18px] h-[18px] flex-shrink-0"></i>
            Manage Merchant
          </span>
          <i data-lucide="chevron-down" class="w-4 h-4 arrow-icon"></i>
        </button>
        <div class="menu-sub" id="sub-merchant">
          <div class="ml-[30px] pl-3 border-l border-slate-600 mt-1 space-y-0.5">
            <a href="cardverify.html" class="menu-sub-link block px-3 py-2 rounded-md text-sm text-slate-400 hover:text-white hover:bg-white/5 transition-colors">Card Verify Submission</a>
            <a href="members.html" class="menu-sub-link active block px-3 py-2 rounded-md text-sm text-white bg-white/5 font-medium">Members</a>
            <a href="monthlypayment.html" class="menu-sub-link block px-3 py-2 rounded-md text-sm text-slate-400 hover:text-white hover:bg-white/5 transition-colors">Monthly Payment</a>
          </div>
        </div>
      </div>
      <div>
        <button data-menu-toggle="sub-package" class="flex items-center justify-between w-full px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
          <span class="flex items-center gap-3">
            <i data-lucide="package" class="w-[18px] h-[18px] flex-shrink-0"></i>
            Package &amp; Product
          </span>
          <i data-lucide="chevron-down" class="w-4 h-4 arrow-icon"></i>
        </button>
        <div class="menu-sub" id="sub-package">
          <div class="ml-[30px] pl-3 border-l border-slate-600 mt-1 space-y-0.5">
            <a href="product.html" class="menu-sub-link block px-3 py-2 rounded-md text-sm text-slate-400 hover:text-white hover:bg-white/5 transition-colors">Product</a>
          </div>
        </div>
      </div>
      <div>
        <button data-menu-toggle="sub-report" class="flex items-center justify-between w-full px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
          <span class="flex items-center gap-3">
            <i data-lucide="bar-chart-3" class="w-[18px] h-[18px] flex-shrink-0"></i>
            Report
          </span>
          <i data-lucide="chevron-down" class="w-4 h-4 arrow-icon"></i>
        </button>
        <div class="menu-sub" id="sub-report">
          <div class="ml-[30px] pl-3 border-l border-slate-600 mt-1 space-y-0.5">
            <a href="dailytransaction.html" class="menu-sub-link block px-3 py-2 rounded-md text-sm text-slate-400 hover:text-white hover:bg-white/5 transition-colors">Daily Transaction</a>
          </div>
        </div>
      </div>
    </nav>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <!-- Navbar -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-6 flex-shrink-0 shadow-sm">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="lg:hidden p-2 -ml-2 rounded-lg hover:bg-gray-100 transition-colors">
          <i data-lucide="menu" class="w-5 h-5 text-gray-600"></i>
        </button>
        <div class="flex items-center text-sm gap-1.5">
          <a href="home.html" class="text-gray-400 hover:text-gray-600 transition-colors">Home</a>
          <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-gray-300"></i>
          <span class="text-gray-900 font-semibold">Members</span>
        </div>
      </div>
      <div class="flex items-center gap-1">
        <button class="p-2 rounded-lg hover:bg-gray-100 transition-colors group" title="Power">
          <i data-lucide="power" class="w-5 h-5 text-gray-400 group-hover:text-gray-600"></i>
        </button>
        <button class="p-2 rounded-lg hover:bg-gray-100 transition-colors group" title="Fullscreen">
          <i data-lucide="maximize" class="w-5 h-5 text-gray-400 group-hover:text-gray-600"></i>
        </button>
        <button class="p-2 rounded-lg hover:bg-gray-100 transition-colors group" title="Profile">
          <i data-lucide="user-circle" class="w-5 h-5 text-gray-400 group-hover:text-gray-600"></i>
        </button>
        <button class="p-2 rounded-lg hover:bg-red-50 transition-colors group" title="Auth">
          <i data-lucide="key-round" class="w-5 h-5 text-red-400 group-hover:text-red-600"></i>
        </button>
      </div>
    </header>

    <main class="main">
      <div style="padding:8px 14px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;"><input type="checkbox" id="liteToggle" onchange="toggleLite(this)">Lite Version (Without Bill Info)</label>
      </div>
      <div class="top-action-bar">
        <button class="btn btn-gray" onclick="exportCSV('membersTable','members_export.csv')">⬇ Download</button>
        <button class="btn btn-gray" onclick="toggleFilter('memberFilter')">⚙ Filter</button>
        <div class="search-right"><div class="search-wrap"><input type="text" id="memberSearch" placeholder="Search Here…" oninput="liveSearch()"><button>🔍</button></div></div>
      </div>
      <div class="filter-panel" id="memberFilter">
        <div class="filter-row">
          <div class="filter-group"><label>Register Date (From)</label><input type="date" class="form-control" id="fDateFrom"></div>
          <div class="filter-group"><label>Register Date (To)</label><input type="date" class="form-control" id="fDateTo"></div>
          <div class="filter-group"><label>Member Name / ID / Keyfob</label><input type="text" class="form-control" id="fMember" placeholder="Search member…"></div>
          <div class="filter-group"><label>Status</label><select class="form-control" id="fStatus"><option value="">All Status</option><option>ACTIVE</option><option>DEFAULTED</option><option>EXPIRED</option><option>FREEZE</option></select></div>
        </div>
        <div class="filter-actions"><button class="btn btn-gray btn-sm" onclick="resetFilter()">↺ RESET</button><button class="btn btn-purple btn-sm" onclick="applyFilter()">⚙ FILTER</button></div>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="membersTable">
          <thead><tr><th style="width:50px;">No.</th><th>Id <button class="sort-btn" onclick="sortTable('membersTable',1,this)">▼</button></th><th>Member Name <button class="sort-btn" onclick="sortTable('membersTable',2,this)">▼</button></th><th>Email</th><th>KeyFob</th><th>Register</th><th id="billInfoHeader">Bill Info</th><th>Status</th><th style="width:80px;">Action</th></tr></thead>
          <tbody id="membersBody"></tbody>
        </table>
      </div>
      <div class="table-footer">Total: Row (<span id="membersTable-count">0</span>)<div class="pagination" id="pagination"></div></div>
    </main>
  </div>
</div>

<div class="modal-overlay hidden" id="memberModal"><div class="modal-box"><div class="modal-title">Member Detail</div><div class="modal-grid" id="memberModalContent"></div><div class="modal-footer"><button class="btn btn-gray" onclick="closeModal('memberModal')">Close</button></div></div></div>
<script src="script.js"></script>
<script>
const MEMBERS = [{id:'M001', name:'Andi Saputra', email:'andi@email.com', keyfob:'KF-001', register:'2024-01-15', bill:'IDR 350,000', status:'ACTIVE'}, {id:'M002', name:'Budi Santoso', email:'budi@email.com', keyfob:'KF-002', register:'2024-02-20', bill:'IDR 350,000', status:'ACTIVE'}, {id:'M003', name:'Citra Dewi', email:'citra@email.com', keyfob:'KF-003', register:'2024-03-10', bill:'IDR 450,000', status:'FREEZE'}, {id:'M004', name:'Dian Rahayu', email:'dian@email.com', keyfob:'KF-004', register:'2024-03-22', bill:'IDR 350,000', status:'ACTIVE'}, {id:'M005', name:'Eko Prasetyo', email:'eko@email.com', keyfob:'KF-005', register:'2024-04-05', bill:'IDR 200,000', status:'EXPIRED'}, {id:'M006', name:'Fajar Nugroho', email:'fajar@email.com', keyfob:'KF-006', register:'2024-04-18', bill:'IDR 350,000', status:'ACTIVE'}, {id:'M007', name:'Gita Lestari', email:'gita@email.com', keyfob:'KF-007', register:'2024-05-01', bill:'IDR 450,000', status:'DEFAULTED'}, {id:'M008', name:'Hendra Wijaya', email:'hendra@email.com', keyfob:'KF-008', register:'2024-05-14', bill:'IDR 350,000', status:'ACTIVE'}, {id:'M009', name:'Indah Pertiwi', email:'indah@email.com', keyfob:'KF-009', register:'2024-06-02', bill:'IDR 200,000', status:'ACTIVE'}, {id:'M010', name:'Joko Susanto', email:'joko@email.com', keyfob:'KF-010', register:'2024-06-19', bill:'IDR 350,000', status:'EXPIRED'}, {id:'M011', name:'Kartika Sari', email:'kartika@email.com', keyfob:'KF-011', register:'2024-07-07', bill:'IDR 450,000', status:'ACTIVE'}, {id:'M012', name:'Lutfi Hakim', email:'lutfi@email.com', keyfob:'KF-012', register:'2024-07-23', bill:'IDR 350,000', status:'FREEZE'}];
let filteredData = [...MEMBERS]; let liteMode = false; const PAGE_SIZE = 8; let currentPage = 1;
function statusBadge(s) { const map = {ACTIVE:'badge-active',EXPIRED:'badge-expired',FREEZE:'badge-freeze',DEFAULTED:'badge-defaulted'}; return `<span class="badge ${map[s]||''}">${s}</span>`; }
function renderTable(data, page) { const tbody = document.getElementById('membersBody'); const start = (page-1)*PAGE_SIZE; const slice = data.slice(start, start+PAGE_SIZE); tbody.innerHTML = slice.map((m, i) => `<tr><td>${start+i+1}.</td><td>${m.id}</td><td>${m.name}</td><td>${m.email}</td><td>${m.keyfob}</td><td>${m.register}</td>${liteMode ? '' : `<td>${m.bill}</td>`}<td>${statusBadge(m.status)}</td><td><button class="btn btn-gray btn-sm" onclick='showMember(${JSON.stringify(m)})'>View</button></td></tr>`).join(''); document.getElementById('membersTable-count').textContent = data.length; renderPagination(data.length, page); }
function renderPagination(total, page) { const pages = Math.ceil(total/PAGE_SIZE); const pg = document.getElementById('pagination'); if (pages <= 1) { pg.innerHTML = ''; return; } let html = `<button class="pg-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`; for (let i=1;i<=pages;i++) html += `<button class="pg-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`; html += `<button class="pg-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>›</button>`; pg.innerHTML = html; }
function goPage(p) { const pages = Math.ceil(filteredData.length/PAGE_SIZE); currentPage = Math.max(1, Math.min(p, pages)); renderTable(filteredData, currentPage); }
function liveSearch() { const q = document.getElementById('memberSearch').value.toLowerCase(); filteredData = MEMBERS.filter(m => m.name.toLowerCase().includes(q) || m.id.toLowerCase().includes(q) || m.email.toLowerCase().includes(q) || m.keyfob.toLowerCase().includes(q)); currentPage = 1; renderTable(filteredData, currentPage); }
function applyFilter() { const from = document.getElementById('fDateFrom').value; const to = document.getElementById('fDateTo').value; const member = document.getElementById('fMember').value.toLowerCase(); const status = document.getElementById('fStatus').value; filteredData = MEMBERS.filter(m => { if (from && m.register < from) return false; if (to && m.register > to) return false; if (member && !m.name.toLowerCase().includes(member) && !m.id.toLowerCase().includes(member)) return false; if (status && m.status !== status) return false; return true; }); currentPage = 1; renderTable(filteredData, currentPage); document.getElementById('memberFilter').classList.remove('open'); }
function resetFilter() { ['fDateFrom','fDateTo','fMember'].forEach(id => document.getElementById(id).value=''); document.getElementById('fStatus').value=''; filteredData = [...MEMBERS]; currentPage = 1; renderTable(filteredData, currentPage); }
function toggleLite(cb) { liteMode = cb.checked; document.getElementById('billInfoHeader').style.display = liteMode ? 'none' : ''; renderTable(filteredData, currentPage); }
function showMember(m) { document.getElementById('memberModalContent').innerHTML = `<div class="form-group"><label>Member ID</label><div style="font-weight:600">${m.id}</div></div><div class="form-group"><label>Full Name</label><div>${m.name}</div></div><div class="form-group"><label>Email</label><div>${m.email}</div></div><div class="form-group"><label>KeyFob</label><div>${m.keyfob}</div></div><div class="form-group"><label>Register Date</label><div>${m.register}</div></div><div class="form-group"><label>Bill Info</label><div>${m.bill}</div></div><div class="form-group"><label>Status</label><div>${statusBadge(m.status)}</div></div>`; openModal('memberModal'); }
renderTable(MEMBERS, 1);
</script>
</body>
</html>
